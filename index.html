<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3F7E72" />
    <meta
      name="description"
      content="Narzędzia wspierające budowanie relacji (poliamorycznych i monogamicznych) — do wypełniania online i druku."
    />
    <title>poly-helper — narzędzia dla relacji</title>
    <script>
      // Ustaw motyw przed renderem (bez mignięcia). Wybór użytkownika lub preferencja systemu.
      (function () {
        try {
          var t = localStorage.getItem('poly-helper:theme');
          if (t !== 'light' && t !== 'dark') {
            t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
